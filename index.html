<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد المبيعات الذكية | Omar Coach</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #07090f;
    --surface: #0f1420;
    --surface2: #161d2e;
    --border: rgba(148,163,220,0.12);
    --accent: #7eb8f7;
    --accent3: #5de8a0;
    --text: #dde3f5;
    --muted: #6b7a9e;
    --radius: 14px;
    --rad-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; direction: rtl; min-height: 100vh; }
  header { background: linear-gradient(135deg, #0b1120 0%, #120e2a 100%); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
  .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #4a9cf5, #8b5cf6); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 19px; box-shadow: 0 0 18px rgba(74,156,245,0.3); }
  .container { padding: 24px 32px; max-width: 1440px; margin: 0 auto; }
  
  .input-zone { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .input-tabs { display: flex; gap: 7px; margin-bottom: 18px; }
  .tab-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; transition: 0.2s; }
  .tab-btn.active { background: rgba(126,184,247,0.12); border-color: var(--accent); color: var(--accent); }
  
  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rad-sm); color: var(--text); padding: 13px; min-height: 120px; outline: none; font-family: inherit; }
  .drop-zone { border: 2px dashed rgba(126,184,247,.2); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; background: var(--surface2); transition: 0.3s; }
  .drop-zone:hover { border-color: var(--accent); background: rgba(126,184,247,0.05); }
  
  .generate-btn { padding: 14px 30px; background: linear-gradient(135deg, #3b82f6, #7c3aed); border: none; border-radius: var(--rad-sm); color: #fff; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; transition: 0.2s; }
  .generate-btn:hover { transform: translateY(-2px); opacity: 0.9; }
  .generate-btn:disabled { opacity: 0.5; transform: none; }

  #dashboardOutput { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); padding: 22px; border-radius: var(--radius); border-right: 4px solid var(--accent); position: relative; overflow: hidden; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }
  
  .status-bar { display: none; background: rgba(126,184,247,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid var(--accent); color: var(--accent); font-weight: 600; }
  
  @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } .container { padding: 15px; } }
</style>
</head>
<body>

<header>
  <div class="logo">📊</div>
  <div>
    <h1>محول البيانات الذكي | Omar Coach</h1>
    <p>بناء داشبورد احترافي من أي ملف أو نص عبر Gemini AI</p>
  </div>
</header>

<div class="container">
  <div class="input-zone">
    <div class="input-tabs">
      <button class="tab-btn active" id="btn-text" onclick="switchTab('text')">📝 نص / أرقام عشوائية</button>
      <button class="tab-btn" id="btn-file" onclick="switchTab('file')">📁 ملف (Excel / PDF / CSV)</button>
    </div>

    <div id="tab-text" class="tab-panel">
      <textarea id="rawData" placeholder="الصق بياناتك هنا... 
مثال: مبيعات فرع القاهرة 50 ألف، فرع الإسكندرية 70 ألف، والمصروفات كانت 20 ألف في شهر مارس."></textarea>
    </div>

    <div id="tab-file" class="tab-panel" style="display:none;">
      <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 18px; margin-bottom: 5px;">☁️</p>
        <p>اسحب الملف هنا أو اضغط للاختيار</p>
        <span style="font-size: 11px; color: var(--muted);">(Excel, CSV, PDF, TXT)</span>
      </div>
      <input type="file" id="fileInput" hidden onchange="handleFile(this.files[0])">
      <div id="fileStatus" style="margin-top:10px; font-size:13px; text-align: center; color: var(--accent3);"></div>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateDashboard()">⚡ تحليل البيانات وتوليد الداشبورد</button>
  </div>

  <div class="status-bar" id="statusBar">🚀 جاري التحليل الذكي للبيانات.. انتظر ثواني</div>

  <div id="dashboardOutput">
    <div style="display: flex; gap: 12px; margin-bottom: 25px; justify-content: center;">
        <button class="tab-btn" style="background: var(--accent); color: #000; font-weight: bold; padding: 10px 25px;" onclick="exportPDF()">📄 تحميل كـ PDF</button>
        <button class="tab-btn" style="padding: 10px 25px;" onclick="window.location.reload()">🔄 إفراغ وتحليل جديد</button>
    </div>
    <div id="captureZone" style="padding: 10px;">
        <h2 id="dashTitle" style="margin-bottom: 25px; text-align: center; color: var(--accent); font-size: 28px;"></h2>
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="charts-grid" id="chartsGrid"></div>
    </div>
  </div>
</div>

<script>
// المفتاح الجديد مدمج هنا
const G_KEY = "AIzaSyCmnI3Y13Q9YvWJLd4PE_96VCY0DRfQcfA"; 
let extractedData = '';
let activeTab = 'text';
let chartInstances = [];

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function switchTab(t) {
  activeTab = t;
  document.getElementById('btn-text').classList.toggle('active', t === 'text');
  document.getElementById('btn-file').classList.toggle('active', t === 'file');
  document.getElementById('tab-text').style.display = t === 'text' ? 'block' : 'none';
  document.getElementById('tab-file').style.display = t === 'file' ? 'block' : 'none';
}

async function handleFile(file) {
  if (!file) return;
  const s = document.getElementById('fileStatus');
  s.textContent = '⏳ جاري معالجة الملف...';
  try {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'pdf') extractedData = await readPDF(file);
    else if (['xlsx','xls','csv'].includes(ext)) extractedData = await readExcel(file);
    else extractedData = await file.text();
    s.textContent = `✅ تم تحميل ملف: ${file.name}`;
  } catch(e) { s.textContent = '❌ خطأ في قراءة الملف'; }
}

async function readPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 15); i++) {
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    text += c.items.map(s => s.str).join(' ');
  }
  return text;
}

async function readExcel(file) {
  const ab = await file.arrayBuffer();
  const wb = XLSX.read(ab);
  return XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);
}

async function generateDashboard() {
  const data = activeTab === 'text' ? document.getElementById('rawData').value : extractedData;
  if(!data || data.length < 5) return alert('الرجاء إدخال بيانات صحيحة أولاً');
  
  const btn = document.getElementById('genBtn');
  const status = document.getElementById('statusBar');
  
  btn.disabled = true;
  status.style.display = 'block';

  try {
    const prompt = `أنت محلل بيانات خبير. قم بتحليل البيانات التالية بدقة واستخرج منها العناوين، المؤشرات الرئيسية (KPIs)، والرسوم البيانية. 
    البيانات: ${data.slice(0,10000)}. 
    يجب أن يكون الرد بصيغة JSON فقط متوافق تماماً مع هذا الهيكل:
    {
      "title": "عنوان الداشبورد",
      "kpis": [{"label": "اسم المؤشر", "value": "القيمة المنسقة", "icon": "إيموجي مناسب"}], 
      "charts": [{"type": "bar أو line أو pie", "title": "عنوان الرسم", "labels": ["عنصر1", "عنصر2"], "datasets": [{"label": "الوصف", "data": [10, 20]}]}]
    }`;

    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
      })
    });

    const res = await resp.json();
    const cleanJson = JSON.parse(res.candidates[0].content.parts[0].text);
    renderDashboard(cleanJson);
  } catch(e) {
    console.error(e);
    alert('عذراً، واجه الذكاء الاصطناعي مشكلة في قراءة البيانات. تأكد من وضوح الأرقام.');
  } finally {
    btn.disabled = false;
    status.style.display = 'none';
  }
}

function renderDashboard(d) {
  document.getElementById('dashboardOutput').style.display = 'block';
  document.getElementById('dashTitle').textContent = d.title;
  
  const kg = document.getElementById('kpiGrid');
  kg.innerHTML = d.kpis.map(k => `
    <div class="kpi-card">
      <div style="font-size:12px; color:var(--muted); margin-bottom: 5px;">${k.icon} ${k.label}</div>
      <div style="font-size:26px; font-weight:bold; color:var(--accent)">${k.value}</div>
    </div>
  `).join('');

  const cg = document.getElementById('chartsGrid');
  cg.innerHTML = '';
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];
  
  d.charts.forEach((ch, i) => {
    const canvasId = `chart-${i}`;
    cg.innerHTML += `<div class="chart-card"><h3 style="margin-bottom:15px; font-size:14px; color:var(--muted)">${ch.title}</h3><div style="height:250px"><canvas id="${canvasId}"></canvas></div></div>`;
    
    setTimeout(() => {
      const ctx = document.getElementById(canvasId).getContext('2d');
      const newChart = new Chart(ctx, {
        type: ch.type,
        data: {
          labels: ch.labels,
          datasets: ch.datasets.map((ds, idx) => ({
            ...ds,
            backgroundColor: ch.type === 'pie' ? ['#7eb8f7', '#b39dfa', '#5de8a0', '#f87171', '#fbbf24'] : '#7eb8f7',
            borderColor: '#7eb8f7',
            borderWidth: 1
          }))
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#dde3f5' } } },
          scales: ch.type !== 'pie' ? {
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7a9e' } },
            x: { grid: { display: false }, ticks: { color: '#6b7a9e' } }
          } : {}
        }
      });
      chartInstances.push(newChart);
    }, 150);
  });
  
  window.scrollTo({ top: document.getElementById('dashboardOutput').offsetTop - 100, behavior: 'smooth' });
}

async function exportPDF() {
    const element = document.getElementById('captureZone');
    const canvas = await html2canvas(element, { backgroundColor: '#07090f', scale: 2 });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const width = pdf.internal.pageSize.getWidth();
    const height = (canvas.height * width) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 5, width, height);
    pdf.save(`Dashboard_${new Date().toLocaleDateString()}.pdf`);
}
</script>
</body>
</html>
