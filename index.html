<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محوّل البيانات الذكي v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#07090f;--s1:#0f1420;--s2:#161d2e;--s3:#1c2540;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.15);
  --txt:#e8edf8;--muted:#7a8aaa;--hint:#3d4a6b;
  --blue:#4f9ef8;--teal:#34d399;--amber:#fbbf24;--coral:#f87171;
  --purple:#a78bfa;--cyan:#22d3ee;--pink:#f472b6;--green:#4ade80;
  --r:14px;--rsm:9px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--txt);direction:rtl;min-height:100vh}
 
/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0a1020,#110a22);border-bottom:1px solid var(--bdr);padding:15px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:99}
.hdr-l{display:flex;align-items:center;gap:12px}
.hlogo{width:38px;height:38px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htit{font-size:16px;font-weight:700}.hsub{font-size:11px;color:var(--muted);margin-top:1px}
.hbadges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:3px 10px;border-radius:20px}
.badge.blue{background:rgba(79,158,248,.12);border:1px solid rgba(79,158,248,.2);color:var(--blue)}
.badge.green{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.2);color:var(--teal)}
 
/* ── PAGE WRAP ── */
.page{padding:22px 28px;max-width:1380px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
 
/* ── UPLOAD CARD ── */
.upload-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:24px}
.card-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px}
 
.dz{border:2px dashed rgba(79,158,248,.22);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;background:var(--s2);transition:all .18s;position:relative}
.dz:hover,.dz.over{border-color:var(--blue);background:rgba(79,158,248,.04)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-ico{font-size:32px;margin-bottom:10px}
.dz p{font-size:14px;color:var(--muted)}.dz span{color:var(--blue);font-weight:600}
.dz-formats{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.fmt-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--bdr2);color:var(--muted)}
 
.opts-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
.hint-in{flex:1;min-width:180px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);color:var(--txt);font-size:13px;padding:9px 13px;outline:none;transition:border .15s;font-family:inherit}
.hint-in:focus{border-color:var(--blue)}
.run-btn{padding:9px 24px;background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;border-radius:var(--rsm);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:opacity .15s;box-shadow:0 3px 16px rgba(37,99,235,.3)}
.run-btn:hover{opacity:.88}.run-btn:active{opacity:.72}.run-btn:disabled{opacity:.35;cursor:default}
 
.fstatus{margin-top:10px;font-size:12px;display:none;align-items:center;gap:8px}
.fstatus.on{display:flex}
.spin{width:13px;height:13px;border:2px solid var(--bdr2);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
 
/* ── STATUS BAR ── */
.sts{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:11px 15px;font-size:12px;color:var(--muted);display:none;align-items:center;gap:8px}
.sts.on{display:flex}
 
/* ── EXPORT BAR ── */
.xbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;padding-bottom:18px;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.xbtn{padding:7px 14px;border:1px solid var(--bdr2);border-radius:var(--rsm);background:var(--s1);color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
.xbtn:hover{border-color:var(--blue);color:var(--blue)}
.xbtn.p{background:var(--blue);border-color:var(--blue);color:#fff}
.xbtn.p:hover{opacity:.88;color:#fff}
#xl{display:none;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
#xl.on{display:flex}
 
/* ── SECTION HEADERS ── */
.sec{display:flex;align-items:center;gap:8px;margin-bottom:13px;margin-top:4px}
.sec-bar{width:3px;height:16px;border-radius:2px}
.sec h2{font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--muted);text-transform:uppercase}
.sec-sheet{font-size:10px;padding:2px 8px;background:var(--s3);border-radius:10px;color:var(--hint);border:1px solid var(--bdr);margin-right:4px}
 
/* ── DASH TITLE ── */
.dash-title{font-size:22px;font-weight:700;margin-bottom:4px}
.dash-sub{font-size:12px;color:var(--muted);margin-bottom:22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sheet-pill{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(79,158,248,.12);border:1px solid rgba(79,158,248,.2);color:var(--blue)}
 
/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 16px 14px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
.kpi:hover{border-color:var(--bdr2);transform:translateY(-1px)}
.kpi-bar{position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 var(--r) var(--r) 0}
.kpi-glow{position:absolute;top:-30px;right:-20px;width:90px;height:90px;border-radius:50%;opacity:.07;pointer-events:none}
.kpi-ico{position:absolute;left:12px;bottom:10px;font-size:20px;opacity:.12}
.kpi-lbl{font-size:10px;color:var(--hint);letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px;line-height:1.4;padding-left:26px;min-height:28px;display:flex;align-items:center}
.kpi-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:6px}
.kpi-sub{font-size:11px;color:var(--muted)}
.kpi-sub.pos{color:var(--teal)}.kpi-sub.neg{color:var(--coral)}
 
/* ── CHART GRID ── */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(370px,1fr));gap:15px;margin-bottom:18px}
.cc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px}
.cc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:8px}
.cc-title{font-size:12px;font-weight:600;flex:1;line-height:1.4}
.cc-badge{font-size:9px;padding:2px 7px;background:var(--s3);border-radius:8px;color:var(--hint);border:1px solid var(--bdr);flex-shrink:0}
.cw{position:relative;width:100%}
.cw.h200{height:200px}.cw.h240{height:240px}.cw.h180{height:180px}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);font-size:10px;color:var(--muted)}
.li{display:flex;align-items:center;gap:5px;max-width:160px;overflow:hidden}
.li span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
 
/* ── TABLE ── */
.tbl-section{margin-bottom:18px}
.tbl-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;overflow-x:auto}
.tbl-card h3{font-size:12px;font-weight:600;margin-bottom:12px;color:var(--txt)}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:300px}
th{background:var(--s3);padding:8px 12px;text-align:right;color:var(--muted);font-weight:600;font-size:10px;border-bottom:1px solid var(--bdr);white-space:nowrap;letter-spacing:.3px}
td{padding:8px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
tr:last-child td,tr:nth-last-child(2) td{background:rgba(79,158,248,.06);font-weight:600;color:var(--blue)}
tr:last-child td:first-child,tr:nth-last-child(2) td:first-child{color:var(--muted)}
tr:hover td{background:rgba(79,158,248,.04)}
 
/* ── INSIGHTS ── */
.ins-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:18px}
.ins-card h3{font-size:12px;font-weight:600;margin-bottom:12px}
.ins-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;line-height:1.65}
.ins-item:last-child{border-bottom:none}
.ins-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
 
/* ── RULES ── */
.rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:18px}
.rule{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:13px 15px;display:flex;gap:10px;align-items:flex-start}
.rule-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;background:rgba(79,158,248,.15);color:var(--blue)}
.rule-t{font-size:11px;line-height:1.7;color:var(--muted)}
 
/* ── EMPTY ── */
#dash{display:none}
 
@media(max-width:700px){
  .page{padding:12px}
  .hdr{padding:12px}
  .chart-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .rules-grid{grid-template-columns:1fr}
}
@media print{
  .hdr .hbadges,.xbar,.upload-card,.sts{display:none!important}
  body{background:#fff;color:#000}
  .cc,.kpi,.tbl-card,.ins-card,.rule{background:#f9fafb;border:1px solid #e5e7eb}
}
</style>
</head>
<body>
 
<div class="hdr">
  <div class="hdr-l">
    <div class="hlogo">📊</div>
    <div><div class="htit">محوّل البيانات الذكي</div>
      <div class="hsub">Excel · CSV · PDF → داشبورد ذكية تلقائياً</div></div>
  </div>
  <div class="hbadges">
    <span class="badge blue">بدون API</span>
    <span class="badge green">يدعم PDF</span>
    <span class="badge blue">متعدد الأوراق</span>
  </div>
</div>
 
<div class="page">
 
  <!-- UPLOAD -->
  <div class="upload-card">
    <div class="card-lbl">ارفع ملفك</div>
    <div class="dz" id="dz">
      <input type="file" id="fi" accept=".xlsx,.xls,.csv,.pdf,.txt" onchange="onFile(this.files[0])">
      <div class="dz-ico">☁️</div>
      <p>اسحب ملفك هنا أو <span>اضغط للاختيار</span></p>
      <div class="dz-formats">
        <span class="fmt-tag">Excel .xlsx</span>
        <span class="fmt-tag">Excel .xls</span>
        <span class="fmt-tag">CSV</span>
        <span class="fmt-tag">PDF</span>
        <span class="fmt-tag">TXT</span>
      </div>
    </div>
    <div class="opts-row">
      <input class="hint-in" id="hint" type="text"
        placeholder="وصف إضافي (اختياري): مثلاً 'ركز على مقارنة الفروع' أو 'الأرقام بالجنيه'">
      <button class="run-btn" id="gb" onclick="generate()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        توليد الداشبورد
      </button>
    </div>
    <div class="fstatus" id="fs"><div class="spin" id="fsp"></div><span id="ftxt"></span></div>
  </div>
 
  <div class="sts" id="st"><div class="spin"></div><span id="stxt"></span></div>
 
  <!-- DASHBOARD -->
  <div id="dash">
    <div class="xbar">
      <button class="xbtn p" onclick="xPDF()">📄 تحميل PDF</button>
      <button class="xbtn" onclick="xPNG()">🖼️ تحميل PNG</button>
      <button class="xbtn" onclick="window.print()">🖨️ طباعة</button>
      <button class="xbtn" onclick="cpIns()">📋 نسخ الملخص</button>
      <button class="xbtn" onclick="resetApp()">🔄 ملف جديد</button>
      <div id="xl"><div class="spin"></div><span id="xm"></span></div>
    </div>
 
    <div id="cz">
      <div class="dash-title" id="dtit"></div>
      <div class="dash-sub" id="dsub"></div>
 
      <div class="sec"><div class="sec-bar" style="background:var(--blue)"></div><h2>مؤشرات الأداء الرئيسية</h2></div>
      <div class="kpi-grid" id="kpiG"></div>
 
      <div class="sec"><div class="sec-bar" style="background:var(--teal)"></div><h2>الرسوم البيانية</h2></div>
      <div class="chart-grid" id="chartG"></div>
 
      <div id="tblSec"></div>
      <div id="insSec"></div>
      <div id="rulesSec"></div>
    </div>
  </div>
 
</div>
 
<script>
// ══════════════════════════════════════════════════════════
//  PALETTE & CONSTANTS
// ══════════════════════════════════════════════════════════
const PF = ['rgba(79,158,248,.82)','rgba(52,211,153,.82)','rgba(167,139,250,.82)',
            'rgba(251,191,36,.82)','rgba(248,113,113,.82)','rgba(34,211,238,.82)',
            'rgba(244,114,182,.82)','rgba(129,140,248,.82)','rgba(16,185,129,.82)','rgba(245,158,11,.82)'];
const PB = ['#4f9ef8','#34d399','#a78bfa','#fbbf24','#f87171','#22d3ee','#f472b6','#818cf8','#10b981','#f59e0b'];
const KCC= {blue:'#4f9ef8',teal:'#34d399',purple:'#a78bfa',amber:'#fbbf24',coral:'#f87171',cyan:'#22d3ee',pink:'#f472b6',green:'#4ade80'};
const ICC= {success:'#34d399',danger:'#f87171',warning:'#fbbf24',info:'#4f9ef8'};
const CLRS=['blue','teal','purple','amber','coral','cyan','pink','green'];
const ICOS=['🎯','📊','📈','⭐','💡','🔢','📌','🏆','📉','🔑'];
const AX='#4a5568', GRID='rgba(255,255,255,.05)';
const TIP_DEF = {backgroundColor:'#1a2235',borderColor:'rgba(255,255,255,.1)',borderWidth:.5,
                 titleColor:'#e8edf8',bodyColor:'#7a8aaa',padding:11,cornerRadius:8};
 
let rawSheets=null, chartInst=[];
 
if(typeof pdfjsLib!=='undefined')
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
 
// ══════════════════════════════════════════════════════════
//  FILE READING
// ══════════════════════════════════════════════════════════
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');onFile(e.dataTransfer.files[0])});
 
async function onFile(file){
  if(!file) return;
  rawSheets=null;
  document.getElementById('gb').disabled=true;
  showFS('⏳ جاري قراءة الملف...','var(--muted)',true);
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    if(['xlsx','xls'].includes(ext))      rawSheets=readExcel(await file.arrayBuffer());
    else if(ext==='csv')                  rawSheets=readCSV(await file.text());
    else if(ext==='pdf')                  rawSheets=await readPDF(file);
    else                                  rawSheets={'نص':(await file.text()).split('\n').filter(l=>l.trim()).map(l=>[l.trim()])};
 
    if(!rawSheets||!Object.keys(rawSheets).length) throw new Error('لا توجد بيانات قابلة للقراءة');
 
    const sheetCount=Object.keys(rawSheets).length;
    const totalRows=Object.values(rawSheets).reduce((s,r)=>s+r.length,0);
    showFS(`✅ "${file.name}" — ${sheetCount} ورقة · ${totalRows.toLocaleString()} سطر`,'var(--teal)',false);
    document.getElementById('gb').disabled=false;
  }catch(e){
    showFS('❌ '+e.message,'var(--coral)',false);
  }
}
 
function readExcel(ab){
  const wb=XLSX.read(ab,{type:'array',raw:true,cellDates:false});
  const out={};
  wb.SheetNames.forEach(n=>{
    const ws=wb.Sheets[n];
    // Get raw values preserving numbers exactly
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true,blankrows:false});
    // Forward-fill horizontally to handle merged cells
    const filled=rows.map(row=>{
      const r=[...row];
      for(let c=1;c<r.length;c++){
        if(r[c]===null||r[c]===undefined||r[c]===''){
          // Only fill if previous cell looks like a time/category header
          const prev=String(r[c-1]||'').trim();
          if(prev&&!/^\d+(\.\d+)?$/.test(prev)) r[c]=null; // keep null for data cells
        }
      }
      return r;
    });
    if(filled.some(r=>r.some(v=>v!==null&&v!==''))) out[n]=filled;
  });
  return out;
}
 
function readCSV(text){
  // Auto-detect delimiter
  const first=text.split('\n')[0]||'';
  const delim=first.includes('\t')?'\t':first.includes('،')?'،':',';
  const rows=text.split('\n').map(l=>l.split(delim).map(c=>c.trim().replace(/^"|"$/g,'')||null));
  return rows.length?{Sheet1:rows}:{};
}
 
async function readPDF(file){
  if(typeof pdfjsLib==='undefined') throw new Error('PDF.js غير متاح');
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const sheets={};
 
  for(let p=1;p<=Math.min(pdf.numPages,30);p++){
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
 
    // Group text items by approximate Y position to form rows
    const items=content.items;
    const byY={};
    items.forEach(item=>{
      const y=Math.round(item.transform[5]/5)*5; // bucket by 5px
      if(!byY[y]) byY[y]=[];
      byY[y].push({x:item.transform[4],text:item.str});
    });
 
    const rows=Object.entries(byY)
      .sort(([a],[b])=>Number(b)-Number(a)) // PDF Y is bottom-up
      .map(([,items])=>{
        items.sort((a,b)=>a.x-b.x);
        return items.map(i=>i.text.trim()).filter(Boolean);
      })
      .filter(r=>r.length>0&&r.some(v=>v.length>0));
 
    if(rows.length) sheets[`صفحة ${p}`]=rows;
  }
  return sheets;
}
 
// ══════════════════════════════════════════════════════════
//  ANALYSIS ENGINE (pure JS — mirrors Python engine_v3.py)
// ══════════════════════════════════════════════════════════
const MONTH_MAP={
  'january':'يناير','february':'فبراير','march':'مارس','april':'أبريل',
  'may':'مايو','june':'يونيو','july':'يوليو','august':'أغسطس',
  'september':'سبتمبر','october':'أكتوبر','november':'نوفمبر','december':'ديسمبر',
  'jan':'يناير','feb':'فبراير','mar':'مارس','apr':'أبريل','jun':'يونيو',
  'jul':'يوليو','aug':'أغسطس','sep':'سبتمبر','oct':'أكتوبر','nov':'نوفمبر','dec':'ديسمبر',
  'يناير':'يناير','فبراير':'فبراير','مارس':'مارس','أبريل':'أبريل','مايو':'مايو',
  'يونيو':'يونيو','يوليو':'يوليو','أغسطس':'أغسطس','سبتمبر':'سبتمبر',
  'أكتوبر':'أكتوبر','نوفمبر':'نوفمبر','ديسمبر':'ديسمبر',
  'q1':'Q1','q2':'Q2','q3':'Q3','q4':'Q4',
  'ربع أول':'Q1','ربع ثاني':'Q2','ربع ثالث':'Q3','ربع رابع':'Q4',
};
 
function sv(v){const s=String(v??'').trim();return(s&&s.toLowerCase()!=='nan'&&s.toLowerCase()!=='null'&&s!=='#N/A'&&s!=='#REF!')?s:'';}
 
function cn(v){
  // Critical: preserve decimal points, handle Arabic numerals
  if(v===null||v===undefined) return null;
  if(typeof v==='number'&&!isNaN(v)) return v;
  let s=String(v).trim();
  // Arabic-Indic digits → ASCII
  s=s.replace(/[٠-٩]/g,d=>d.charCodeAt(0)-1632);
  // Remove ONLY safe chars — NOT '.' decimal point
  s=s.replace(/[,،\s]/g,'');         // thousands seps
  s=s.replace(/(?<=\d)%$/,'');       // trailing % after digit
  s=s.replace(/ج\.م|EGP|\$|£|€/g,'');  // currency (literal match, preserves '.' elsewhere)
  s=s.trim();
  const n=parseFloat(s);
  return isNaN(n)?null:n;
}
 
function isTime(x){
  const x2=sv(x).toLowerCase().replace(/\s/g,'');
  if(Object.keys(MONTH_MAP).some(k=>x2.includes(k))) return true;
  if(/^(20\d\d|19\d\d|q\d|\d{4})$/.test(x2)) return true;
  return false;
}
 
function normTime(x){
  const x2=sv(x).toLowerCase().replace(/\s/g,'');
  for(const[k,v] of Object.entries(MONTH_MAP)){if(x2.includes(k)) return v;}
  const m=x2.match(/20\d\d|19\d\d/);
  if(m) return m[0];
  return sv(x);
}
 
function fmt(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  n=Number(n);
  if(Math.abs(n)>=1e9) return(n/1e9).toFixed(2)+'B';
  if(Math.abs(n)>=1e6) return(n/1e6).toFixed(2)+'M';
  if(Math.abs(n)>=1e3) return Math.round(n).toLocaleString('ar-EG');
  return parseFloat(n.toFixed(2)).toLocaleString();
}
 
function pct(a,b){return b&&b!==0?Math.round((a-b)/Math.abs(b)*1000)/10:null;}
 
// ── LAYOUT DETECTORS ──────────────────────────────────────
function getCell(rows,r,c){try{return rows[r][c]??null;}catch{return null;}}
function rowSV(rows,r){return(rows[r]||[]).map(sv);}
 
function tryWide(rows,name){
  // Find time-header row
  let timeRow=-1;
  for(let r=0;r<Math.min(10,rows.length);r++){
    const timeCnt=(rows[r]||[]).filter(v=>v&&isTime(v)).length;
    if(timeCnt>=2){timeRow=r;break;}
  }
  if(timeRow<0) return null;
 
  const C=(rows[timeRow]||[]).length;
 
  // Build col→period map (with horizontal fill already done)
  const colPeriod={};
  let curP='';
  for(let c=1;c<C;c++){
    const v=sv(getCell(rows,timeRow,c));
    if(v&&isTime(v)) curP=normTime(v);
    if(curP) colPeriod[c]=curP;
  }
  if(!Object.keys(colPeriod).length) return null;
 
  // Sub-header (e.g. branch names)?
  const subMap={};
  let subRow=-1;
  for(let r=timeRow+1;r<Math.min(timeRow+4,rows.length);r++){
    const vals=(rows[r]||[]).slice(1).map(v=>sv(v)).filter(v=>v&&cn(v)===null&&!isTime(v));
    if(vals.length>=2){
      subRow=r;
      for(let c=1;c<(rows[r]||[]).length;c++){
        const v=sv(getCell(rows,r,c));
        if(v&&cn(v)===null&&!isTime(v)) subMap[c]=v;
      }
      break;
    }
  }
 
  const periods=[...new Set(Object.values(colPeriod))];
  const subs=[...new Set(Object.values(subMap))];
  const dataStart=subRow>=0?subRow+1:timeRow+1;
 
  const series=[];
  const title=sv(getCell(rows,0,0))||name;
 
  for(let r=dataStart;r<rows.length;r++){
    const rowName=sv(getCell(rows,r,0));
    if(!rowName||cn(rowName)!==null||rowName.length>100) continue;
    // Must have some numeric data
    const numCount=Object.keys(colPeriod).filter(c=>cn(getCell(rows,r,Number(c)))!==null).length;
    if(numCount===0) continue;
 
    if(subs.length>0){
      subs.forEach(sub=>{
        const subCols=Object.entries(subMap).filter(([,s])=>s===sub).map(([c])=>Number(c));
        const vals=periods.map(p=>{
          const pSubCols=subCols.filter(c=>colPeriod[c]===p);
          return pSubCols.length?cn(getCell(rows,r,pSubCols[0])):null;
        });
        if(vals.some(v=>v!==null)) series.push({name:`${rowName} (${sub})`,values:vals});
      });
    } else {
      const vals=periods.map(p=>{
        const pCols=Object.entries(colPeriod).filter(([,pp])=>pp===p).map(([c])=>Number(c));
        const pvs=pCols.map(c=>cn(getCell(rows,r,c))).filter(v=>v!==null);
        return pvs.length?pvs[0]:null;
      });
      if(vals.some(v=>v!==null)) series.push({name:rowName,values:vals});
    }
  }
 
  if(!series.length) return null;
  return{labels:periods,series,title,isTime:true,layout:'wide',_score:series.length*15+periods.length*2};
}
 
function tryTall(rows,name){
  let hRow=0,bestSc=-1;
  for(let r=0;r<Math.min(8,rows.length);r++){
    const row=(rows[r]||[]).map(sv);
    const ne=row.filter(v=>v);
    const sc=ne.filter(v=>cn(v)===null).length*2+ne.length;
    if(sc>bestSc&&ne.length>=2){bestSc=sc;hRow=r;}
  }
  if(bestSc<3) return null;
 
  const headers=(rows[hRow]||[]).map(sv);
  const data=rows.slice(hRow+1);
  if(data.length<2) return null;
 
  let lblCol=-1;
  for(let c=0;c<Math.min(3,headers.length);c++){
    const vals=data.map(r=>sv(r?.[c]||'')).filter(Boolean);
    const real=vals.filter(v=>cn(v)===null);
    if(real.length>=Math.max(2,vals.length*0.3)){lblCol=c;break;}
  }
  if(lblCol<0) return null;
 
  const numCols=headers.map((_,c)=>{
    if(c===lblCol) return false;
    const valid=data.filter(r=>cn(r?.[c])!==null).length;
    return valid>=Math.max(2,data.length*0.3);
  }).reduce((a,ok,c)=>ok?[...a,c]:a,[]);
  if(!numCols.length) return null;
 
  const validRows=data.filter(r=>{const v=sv(r?.[lblCol]||'');return v&&cn(v)===null;});
  if(validRows.length<2) return null;
 
  const labels=validRows.map(r=>sv(r[lblCol]));
  const series=numCols.map(c=>({
    name:headers[c]||`عمود ${c+1}`,
    values:validRows.map(r=>cn(r[c])),
  }));
 
  const title=sv(rows[0]?.[0])||name;
  return{labels,series,title,isTime:labels.some(isTime),layout:'tall',_score:series.length*10+labels.length};
}
 
function extractKV(rows){
  const pairs={};
  rows.forEach(row=>{
    for(let c=0;c<(row||[]).length-1;c++){
      const k=sv(row[c]);
      if(!k||k.length>70||cn(k)!==null) continue;
      for(const dc of[1,2]){
        if(c+dc>=(row||[]).length) break;
        const n=cn(row[c+dc]);
        if(n!==null){pairs[k]=n;break;}
      }
    }
  });
  return pairs;
}
 
function extractTexts(rows){
  const texts=[],seen=new Set();
  rows.forEach(row=>(row||[]).forEach(v=>{
    const s=sv(v);
    if(s.length>60&&cn(s)===null&&!seen.has(s)){texts.push(s);seen.add(s);}
  }));
  return texts;
}
 
// ── MAIN ANALYSIS ──────────────────────────────────────────
function analyzeAll(sheetsRaw,hint){
  const sections=[];
  let allKV={}, allTexts=[];
 
  for(const[name,rows] of Object.entries(sheetsRaw)){
    const res=tryWide(rows,name)||tryTall(rows,name);
    if(res&&res.series.length){
      res.sheetName=name;
      res.kv=extractKV(rows);
      res.texts=extractTexts(rows);
      allKV={...allKV,...res.kv};
      allTexts=[...allTexts,...res.texts];
      sections.push(res);
    } else {
      // Still extract KV and texts from sheets without clean layout
      const kv=extractKV(rows);
      const tx=extractTexts(rows);
      allKV={...allKV,...kv};
      allTexts=[...allTexts,...tx];
    }
  }
 
  sections.sort((a,b)=>b._score-a._score);
  return buildDash(sections,allKV,allTexts,hint);
}
 
function buildDash(sections,allKV,allTexts,hint){
  if(!sections.length&&!Object.keys(allKV).length)
    return{error:'لم يتم العثور على بيانات قابلة للتحليل'};
 
  const primary=sections[0]||null;
 
  // ── KPIs ──
  const kpis=[]; const usedK=new Set();
  sections.forEach(sec=>{
    sec.series.forEach((sr,i)=>{
      if(kpis.length>=6||usedK.has(sr.name)) return;
      const vals=sr.values.filter(v=>v!==null);
      if(!vals.length) return;
      const total=vals.reduce((a,b)=>a+b,0);
      const avg=total/vals.length;
      kpis.push({label:sr.name,value:fmt(total),sub:`متوسط: ${fmt(avg)}`,
                 color:CLRS[kpis.length%CLRS.length],icon:ICOS[kpis.length%ICOS.length],trend:'neu'});
      usedK.add(sr.name);
    });
    if(sec.isTime&&sec.series.length){
      const sr=sec.series[0];
      const vals=sr.values.filter(v=>v!==null);
      if(vals.length>=2&&vals[0]){
        const g=pct(vals[vals.length-1],vals[0]);
        if(g!==null&&!usedK.has('g_'+sr.name)){
          kpis.push({label:`نمو: ${sr.name}`,value:`${g>=0?'+':''}${g}%`,
                     sub:sec.labels.length?`${sec.labels[0]} → ${sec.labels[sec.labels.length-1]}`:'',
                     color:g>=0?'teal':'coral',icon:g>=0?'📈':'📉',trend:g>=0?'pos':'neg'});
          usedK.add('g_'+sr.name);
        }
      }
    }
  });
  Object.entries(allKV).slice(0,3).forEach(([k,v])=>{
    if(kpis.length>=6||usedK.has(k)||k.length>50) return;
    kpis.push({label:k,value:fmt(v),sub:'—',color:CLRS[kpis.length%CLRS.length],icon:'📌',trend:'neu'});
    usedK.add(k);
  });
 
  // ── CHARTS ──
  const charts=[]; let cid=0;
  function lDS(sr,i){return{label:sr.name,data:sr.values.slice(0,20).map(v=>v??0),
    borderColor:PB[i%PB.length],backgroundColor:PF[i%PF.length].replace('.82','.10'),
    fill:true,tension:.38,pointRadius:4,pointHoverRadius:7,
    pointBackgroundColor:PB[i%PB.length],pointBorderColor:'#07090f',pointBorderWidth:2,borderWidth:2.5};}
  function bDS(sr,i,perBar=false){
    const l=sr.values.slice(0,20).length;
    const bg=perBar?Array.from({length:l},(_,j)=>PF[(i*3+j)%PF.length]):PF[i%PF.length];
    const bc=perBar?Array.from({length:l},(_,j)=>PB[(i*3+j)%PB.length]):PB[i%PB.length];
    return{label:sr.name,data:sr.values.slice(0,20).map(v=>v??0),
           backgroundColor:bg,borderColor:bc,borderWidth:1.5,borderRadius:6,borderSkipped:false};}
 
  sections.slice(0,3).forEach(sec=>{
    const{labels,series,isTime:isT,title,sheetName}=sec;
    const lbl=labels.slice(0,20), n=series.length;
    if(!series.length||!lbl.length) return;
 
    if(isT){
      charts.push({id:`c${cid++}`,type:'line',title:`التطور — ${title}`,labels:lbl,sheet:sheetName,
                   datasets:series.slice(0,4).map(lDS)});
      if(n>=2) charts.push({id:`c${cid++}`,type:'bar',title:`مقارنة — ${title}`,labels:lbl,sheet:sheetName,
                   datasets:series.slice(0,4).map((s,i)=>bDS(s,i))});
    } else {
      charts.push({id:`c${cid++}`,type:'bar',title:`مقارنة — ${title}`,labels:lbl,sheet:sheetName,
                   datasets:series.slice(0,4).map((s,i)=>bDS(s,i,n===1))});
    }
    if(n>=2){
      const dL=[],dV=[];
      series.slice(0,8).forEach(sr=>{
        const v=sr.values.filter(v=>v!==null);
        if(v.length){dL.push(sr.name);dV.push(v.reduce((a,b)=>a+b,0));}
      });
      if(dL.length) charts.push({id:`c${cid++}`,type:'doughnut',
        title:`التوزيع — ${title}`,labels:dL,sheet:sheetName,
        datasets:[{label:'الإجمالي',data:dV,backgroundColor:PF.slice(0,dV.length),borderColor:PB.slice(0,dV.length),borderWidth:2}]});
    }
  });
 
  // ── TABLES ──
  const tables=sections.slice(0,3).map(sec=>{
    const{labels,series,isTime:isT,title}=sec;
    if(!series.length||!labels.length) return null;
    const headers=['البند',...series.slice(0,6).map(s=>s.name)];
    const rows=labels.slice(0,20).map((lbl,i)=>
      [lbl,...series.slice(0,6).map(sr=>i<sr.values.length&&sr.values[i]!==null?fmt(sr.values[i]):'—')]
    );
    // Totals
    rows.push(['الإجمالي',...series.slice(0,6).map(sr=>{
      const v=sr.values.filter(v=>v!==null); return v.length?fmt(v.reduce((a,b)=>a+b,0)):'—';})]);
    // Growth row
    if(isT) rows.push(['النمو %',...series.slice(0,6).map(sr=>{
      const v=sr.values.filter(v=>v!==null);
      if(v.length>=2&&v[0]){const g=pct(v[v.length-1],v[0]);return g!==null?`${g>=0?'+':''}${g}%`:'—';}
      return '—';})]);
    return{title,headers,rows};
  }).filter(Boolean);
 
  // ── INSIGHTS ──
  const insights=[];
  sections.forEach(sec=>{
    const{labels,series,isTime:isT}=sec;
    series.slice(0,3).forEach(sr=>{
      const vals=sr.values.filter(v=>v!==null); if(!vals.length) return;
      const total=vals.reduce((a,b)=>a+b,0),mx=Math.max(...vals);
      const mxi=sr.values.indexOf(mx), mxl=mxi>=0&&mxi<labels.length?labels[mxi]:'';
      insights.push({text:`"${sr.name}": إجمالي ${fmt(total)} — الذروة في "${mxl}" (${fmt(mx)})`,type:'success'});
      if(isT&&vals.length>=2&&vals[0]){
        const g=pct(vals[vals.length-1],vals[0]);
        if(g!==null) insights.push({text:`نمو "${sr.name}": ${g>=0?'+':''}${g}% خلال الفترة`,type:g>=0?'success':'danger'});
      }
    });
    if(sec.series.length>=2){
      const tots=sec.series.map(sr=>({n:sr.name,v:sr.values.filter(v=>v!==null).reduce((a,b)=>a+b,0)}))
                            .sort((a,b)=>b.v-a.v);
      insights.push({text:`الأعلى: "${tots[0].n}" بـ ${fmt(tots[0].v)} — الأدنى: "${tots[tots.length-1].n}" بـ ${fmt(tots[tots.length-1].v)}`,type:'info'});
    }
  });
 
  // ── RULES / NOTES ──
  const rules=[...new Set(allTexts)].filter(t=>t.length>30).slice(0,6).map(t=>({text:t.slice(0,400)}));
 
  // Title & subtitle
  const sheetNames=sections.map(s=>s.sheetName).filter(Boolean);
  const title=hint||(primary?.title)||'تحليل البيانات';
  const subtitle=sheetNames.length>1?`${sections.length} أقسام · ${sheetNames.length} ورقة`:
                 primary?`${primary.series.length} سلسلة · ${primary.labels.length} بند`:'';
 
  return{title,subtitle,sheetNames,kpis:kpis.slice(0,6),charts:charts.slice(0,8),
         tables,insights:insights.slice(0,8),rules};
}
 
// ══════════════════════════════════════════════════════════
//  GENERATE & RENDER
// ══════════════════════════════════════════════════════════
async function generate(){
  if(!rawSheets) return;
  const hint=document.getElementById('hint').value.trim();
  document.getElementById('gb').disabled=true;
  document.getElementById('dash').style.display='none';
  showSt('🔍 جاري تحليل هيكل البيانات...');
  await new Promise(r=>setTimeout(r,60));
  try{
    const d=analyzeAll(rawSheets,hint);
    if(d.error){hideSt();alert(d.error);return;}
    hideSt();
    render(d);
  }catch(e){hideSt();alert('خطأ: '+e.message);console.error(e);}
  document.getElementById('gb').disabled=false;
}
 
function render(d){
  chartInst.forEach(c=>c.destroy()); chartInst=[];
 
  document.getElementById('dtit').textContent=d.title||'الداشبورد';
  const dsub=document.getElementById('dsub');
  dsub.innerHTML=d.subtitle?`<span>${d.subtitle}</span>`:'';
  if(d.sheetNames?.length>1) d.sheetNames.forEach(n=>{
    const s=document.createElement('span');s.className='sheet-pill';s.textContent=n;dsub.appendChild(s);
  });
 
  // KPIs
  const kg=document.getElementById('kpiG'); kg.innerHTML='';
  (d.kpis||[]).forEach(k=>{
    const c=KCC[k.color]||KCC.blue;
    const ar=k.trend==='pos'?'↑ ':k.trend==='neg'?'↓ ':'';
    kg.innerHTML+=`<div class="kpi">
      <div class="kpi-bar" style="background:${c}"></div>
      <div class="kpi-glow" style="background:${c}"></div>
      <div class="kpi-ico">${k.icon||'📊'}</div>
      <div class="kpi-lbl">${k.label}</div>
      <div class="kpi-val" style="color:${c}">${k.value}</div>
      <div class="kpi-sub ${k.trend||'neu'}">${ar}${k.sub||'—'}</div>
    </div>`;
  });
 
  // Charts
  const cg=document.getElementById('chartG'); cg.innerHTML='';
  const TL={bar:'أعمدة',line:'خط',pie:'دائري',doughnut:'دونات'};
  const tipCB={callbacks:{label:ctx=>{
    const v=ctx.parsed?.y??ctx.parsed;
    return ` ${ctx.dataset.label||ctx.label}: ${typeof v==='number'?Math.round(v).toLocaleString('ar-EG'):v}`;
  }}};
 
  (d.charts||[]).forEach((ch,idx)=>{
    const isPie=['pie','doughnut'].includes(ch.type);
    const isBig=ch.labels?.length>8&&!isPie;
    cg.innerHTML+=`<div class="cc">
      <div class="cc-head">
        <span class="cc-title">${ch.title}</span>
        <span class="cc-badge">${TL[ch.type]||ch.type}</span>
      </div>
      <div class="cw ${isBig?'h240':'h200'}"><canvas id="${ch.id}"></canvas></div>
      <div class="leg" id="leg_${ch.id}"></div>
    </div>`;
 
    setTimeout(()=>{
      const ctx=document.getElementById(ch.id); if(!ctx) return;
      const opts={responsive:true,maintainAspectRatio:false,
        animation:{duration:650,easing:'easeOutQuart'},
        plugins:{legend:{display:false},tooltip:{...TIP_DEF,...tipCB}},
        scales:isPie?{}:{
          x:{ticks:{color:AX,font:{size:10},autoSkip:false,maxRotation:40},grid:{color:GRID,drawBorder:false},border:{color:GRID}},
          y:{ticks:{color:AX,font:{size:10},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':Math.abs(v)>=1e3?(v/1000).toFixed(0)+'K':v},
             grid:{color:GRID,drawBorder:false},border:{color:GRID}}
        }
      };
      if(isPie) opts.cutout='60%';
      const inst=new Chart(ctx,{type:ch.type,data:{labels:ch.labels,datasets:ch.datasets},options:opts});
      chartInst.push(inst);
 
      // Legend
      const leg=document.getElementById('leg_'+ch.id);
      if(!leg) return;
      if(isPie){
        leg.innerHTML=ch.labels.map((l,j)=>`<div class="li"><div class="ld" style="background:${PB[j%PB.length]}"></div><span>${l}</span></div>`).join('');
      } else if((ch.datasets||[]).length>1){
        leg.innerHTML=ch.datasets.map((ds,j)=>`<div class="li"><div class="ld" style="background:${Array.isArray(ds.borderColor)?ds.borderColor[0]:ds.borderColor}"></div><span>${ds.label}</span></div>`).join('');
      } else leg.style.display='none';
    },80+idx*30);
  });
 
  // Tables
  const tblSec=document.getElementById('tblSec'); tblSec.innerHTML='';
  (d.tables||[]).forEach(tbl=>{
    if(!tbl) return;
    tblSec.innerHTML+=`<div class="tbl-section">
      <div class="sec"><div class="sec-bar" style="background:var(--amber)"></div>
        <h2>جدول البيانات</h2><span class="sec-sheet">${tbl.title}</span></div>
      <div class="tbl-card">
        <div style="overflow-x:auto"><table>
          <thead><tr>${tbl.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${tbl.rows.map(r=>'<tr>'+r.map(c=>`<td title="${c}">${c}</td>`).join('')+'</tr>').join('')}</tbody>
        </table></div>
      </div></div>`;
  });
 
  // Insights
  const insSec=document.getElementById('insSec');
  if(d.insights?.length){
    insSec.innerHTML=`<div class="sec"><div class="sec-bar" style="background:var(--cyan)"></div><h2>الرؤى والاستنتاجات</h2></div>
      <div class="ins-card"><h3>💡 تحليل تلقائي للبيانات</h3>
        ${d.insights.map(ins=>`<div class="ins-item"><div class="ins-dot" style="background:${ICC[ins.type]||ICC.info}"></div><span>${ins.text}</span></div>`).join('')}
      </div>`;
  } else insSec.innerHTML='';
 
  // Rules / notes
  const rulesSec=document.getElementById('rulesSec');
  if(d.rules?.length){
    rulesSec.innerHTML=`<div class="sec"><div class="sec-bar" style="background:var(--purple)"></div><h2>ملاحظات ونصوص من الملف</h2></div>
      <div class="rules-grid">
        ${d.rules.map((r,i)=>`<div class="rule"><div class="rule-n">${i+1}</div><div class="rule-t">${r.text}</div></div>`).join('')}
      </div>`;
  } else rulesSec.innerHTML='';
 
  document.getElementById('dash').style.display='block';
  document.getElementById('dash').scrollIntoView({behavior:'smooth',block:'start'});
}

function showXL(m){document.getElementById('xm').textContent=m;document.getElementById('xl').classList.add('on');}
function hideXL(){document.getElementById('xl').classList.remove('on');}
function showSt(m){document.getElementById('stxt').textContent=m;document.getElementById('st').classList.add('on');}
function hideSt(){document.getElementById('st').classList.remove('on');}
function showFS(m,c,spin){
  const el=document.getElementById('fs'); el.classList.add('on');
  document.getElementById('fsp').style.display=spin?'block':'none';
  const t=document.getElementById('ftxt'); t.textContent=m; t.style.color=c;
}
 
async function xPNG(){
  if(typeof html2canvas==='undefined'){alert('مكتبة html2canvas غير متاحة');return;}
  showXL('جاري إنشاء الصورة...');
  try{
    const cv=await html2canvas(document.getElementById('cz'),{scale:2,useCORS:true,logging:false,backgroundColor:'#07090f'});
    const a=document.createElement('a');a.download='dashboard.png';a.href=cv.toDataURL('image/png');a.click();
  }catch(e){alert('خطأ: '+e.message);}
  hideXL();
}
 
async function xPDF(){
  if(typeof html2canvas==='undefined'){window.print();return;}
  showXL('جاري إنشاء PDF...');
  try{
    const cv=await html2canvas(document.getElementById('cz'),{scale:1.8,useCORS:true,logging:false,backgroundColor:'#07090f'});
    const img=cv.toDataURL('image/jpeg',.93);
    const{jsPDF}=window.jspdf||{};
    if(!jsPDF){window.print();hideXL();return;}
    const pdf=new jsPDF({orientation:cv.width>cv.height?'landscape':'portrait',unit:'px',format:[cv.width,cv.height]});
    pdf.addImage(img,'JPEG',0,0,cv.width,cv.height);
    pdf.save('dashboard.pdf');
  }catch(e){alert('خطأ: '+e.message);}
  hideXL();
}
 
function cpIns(){
  const items=document.querySelectorAll('.ins-item span');
  const t=document.getElementById('dtit').textContent+'\n\n'+Array.from(items).map(i=>'• '+i.textContent).join('\n');
  navigator.clipboard.writeText(t).then(()=>alert('تم النسخ!')).catch(()=>alert('غير متاح في هذا المتصفح'));
}
 
function resetApp(){
  rawSheets=null;
  document.getElementById('dash').style.display='none';
  document.getElementById('fs').classList.remove('on');
  document.getElementById('hint').value='';
  document.getElementById('gb').disabled=true;
  document.getElementById('fi').value='';
  chartInst.forEach(c=>c.destroy());chartInst=[];
  window.scrollTo({top:0,behavior:'smooth'});
}
